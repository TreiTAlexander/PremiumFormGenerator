}

/* Header */
.r-header{padding:36px 44px 24px;position:relative;border-bottom:1px solid rgba(100,140,255,0.15);}
.r-orbit{
  position:absolute;top:20px;right:36px;
  width:70px;height:70px;
  border-radius:50%;
  border:1px solid rgba(100,140,255,0.2);
  display:flex;align-items:center;justify-content:center;
}
.r-orbit::before{
  content:'';position:absolute;
  width:90px;height:20px;
  border-radius:50%;
  border:0.5px solid rgba(100,140,255,0.12);
  transform:rotateX(75deg);
}
.r-orbit-dot{width:8px;height:8px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#60a0ff,#2040a0);}
.r-name{

  position:relative;z-index:1;
}
.r-title{
  font-size:12px;font-weight:300;
  letter-spacing:4px;text-transform:uppercase;
  color:#6080c0;margin-bottom:14px;
}
.r-contact-row{display:flex;gap:18px;flex-wrap:wrap;}
.r-ci{font-family:'DM Mono',monospace;font-size:10px;color:#4060a0;display:flex;align-items:center;gap:4px;}
.r-ci::before{content:'◆';font-size:6px;color:#4080ff;}

/* Body */
.r-body{display:grid;grid-template-columns:1fr 200px;gap:0;padding:24px 44px 36px;position:relative;}

.r-main{}
.r-sec{margin-bottom:22px;}
.r-sec-hd{
  font-size:10px;font-weight:600;letter-spacing:4px;

.r-sec-hd::before{content:'✦';font-size:8px;color:#4080ff;}
.r-sum{font-size:12.5px;line-height:1.75;color:#8098c0;font-weight:300;}
.r-job{margin-bottom:18px;padding:12px;background:rgba(20,40,100,0.15);border:1px solid rgba(64,128,255,0.1);border-radius:4px;}
.r-jt{font-size:14px;font-weight:600;color:#c0d4f4;line-height:1.2;}
.r-jmeta{font-family:'DM Mono',monospace;font-size:9px;color:#4060a0;margin:3px 0 6px;display:flex;gap:10px;}
.r-jl{list-style:none;}

    const sz=Math.random()*1.5+0.3;

function g(id){const e=document.getElementById(id);return e?e.value:'';}
