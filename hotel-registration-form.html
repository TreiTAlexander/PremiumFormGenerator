<style>
:root{--bk:#02030c;--bl:#1a7fff;--cy:#40c8ff;--gd:#ffd438;--g2:#ffb800;--wh:#eef2ff;--gr:#6878a0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bk);color:var(--wh);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden;}
#cv{position:fixed;inset:0;z-index:0;pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,20,.03) 3px,rgba(0,0,20,.03) 4px);pointer-events:none;z-index:0;}
nav{position:sticky;top:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:rgba(2,3,12,.92);backdrop-filter:blur(24px);border-bottom:1px solid rgba(26,127,255,.15);}
.nlogo{height:28px;} .nft{font-family:'Playfair Display',serif;font-size:14px;font-weight:900;color:var(--gd);}
.nbk{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:7px 14px;border-radius:4px;border:1px solid rgba(64,200,255,.28);background:0;color:var(--cy);text-decoration:none;}
.pg{position:relative;z-index:1;padding:20px 16px 60px;max-width:760px;margin:0 auto;}
.pghd{text-align:center;padding:12px 0 20px;}
.eye{font-size:9px;font-weight:700;letter-spacing:5px;color:var(--bl);text-transform:uppercase;margin-bottom:6px;}
.ptitle{font-family:'Playfair Display',serif;font-size:clamp(18px,5vw,26px);font-weight:900;color:var(--wh);}
.ptitle span{color:var(--gd);}
.rule{width:36px;height:2px;background:linear-gradient(90deg,var(--bl),var(--cy));border-radius:2px;margin:10px auto 0;}
.ed{display:flex;flex-direction:column;gap:12px;}
.pnl{background:rgba(4,6,20,.85);border:1px solid rgba(26,127,255,.16);border-radius:12px;padding:18px;backdrop-filter:blur(16px);}
.pnl h3{font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--bl);margin-bottom:14px;}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gr);margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;border:1px solid rgba(26,127,255,.2);border-radius:5px;padding:10px 12px;font-size:13px;font-family:'DM Mono',monospace;color:var(--wh);background:rgba(2,3,12,.7);outline:none;-webkit-appearance:none;resize:vertical;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--cy);}
.fg select option{background:#05081a;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.sdv{font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(104,120,160,.4);margin:14px 0 10px;padding-top:14px;border-top:1px solid rgba(26,127,255,.08);}
.pw{background:rgba(4,6,20,.85);border:1px solid rgba(26,127,255,.16);border-radius:12px;padding:18px;backdrop-filter:blur(16px);}
.pw h3{font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--bl);margin-bottom:12px;}
.ds{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ar{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
.bpr,.bdl,.bim{flex:1;min-width:100px;padding:12px;border-radius:6px;font-family:'Exo 2';font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;}
.bpr{border:1px solid rgba(64,200,255,.28);background:0;color:var(--cy);}
.bdl{border:none;background:linear-gradient(135deg,var(--gd),var(--g2));color:var(--bk);}
.bim{border:1px solid rgba(64,200,255,.2);background:rgba(26,127,255,.08);color:var(--wh);}
@media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
#cv,body::after,nav,.ar,.pnl,.pghd,.pw>h3{display:none!important;}
.pw{border:none!important;background:transparent!important;padding:0!important;}
.pg{padding:0!important;}}
