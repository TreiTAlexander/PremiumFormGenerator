dding:10px;background:rgba(7,20,38,.8);display:grid;gap:8px}.item-head{display:flex;align-items:center;justify-content:space-between;gap:8px}.item-head strong{color:var(--gold);letter-spacing:.12em;text-transform:uppercase;font-size:11px}button{border:1px solid rgba(41,159,234,.48);background:#061322;color:#eaf7ff;border-radius:6px;padding:11px 12px;font:900 12px Barlow,sans-serif;text-transform:uppercase;letter-spacing:.18em;cursor:pointer}button.primary{border-color:transparent;background:var(--gold);color:#01040b}button.danger{padding:7px 9px;color:#ff9fa9;border-color:rgba(255,91,113,.35)}.notice{margin:12px 0 0;color:#ffcf2e;font:700 12px/1.4 Barlow,sans-serif}.stage{overflow:auto;padding:14px;background:#020611;border:1px solid rgba(41,159,234,.22);border-radius:8px}.export-area{width:940px;margin:0 auto}.sheet{width:940px;min-height:1220px;margin:0 auto;position:relative;color:var(--ink);background:var(--paper);box-shadow:0 28px 65px rgba(0,0,0,.42);padding:32px;overflow:hidden;font-family:Arial,Helvetica,sans-serif}.sheet:after{content:attr(data-watermark);position:absolute;top:47%;left:50%;transform:translate(-50%,-50%) rotate(-34deg);width:1200px;color:rgba(70,70,70,.24);font:900 130px Georgia,serif;text-align:center;pointer-events:none;z-index:0}.sheet.no-watermark:after{display:none}.sheet-content{position:relative;z-index:1}.sample-strip{text-align:center;color:#b32030;border-top:2px solid rgba(179,32,48,.58);border-bottom:2px solid rgba(179,32,48,.58);padding:10px 8px;text-transform:uppercase;letter-spacing:.2em;font:900 13px Barlow,sans-serif;margin:16px auto 0;width:940px;background:#fbfbf7}.rc-header{text-align:center;margin-bottom:14px}.logo{width:92px;height:72px;margin:0 auto 8px;display:grid;place-items:center;border:2px solid #111;overflow:hidden;font:900 20px Barlow,sans-serif}.logo.round{border-radius:50%;width:98px;height:98px}.logo img{width:100%;height:100%;object-fit:contain;padding:7px}.doc-title{margin:0;font:900 26px Arial,sans-serif;text-transform:uppercase}.sub-title{margin:3px 0 0;font:700 16px Arial,sans-serif}.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--grid);margin:10px 0 14px}.meta-item{min-height:34px;border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);padding:5px 7px;font-size:12px}.meta-item:nth-child(3n){border-right:0}.meta-item:nth-last-child(-n+3){border-bottom:0}.meta-item b{display:block;font-size:11px}.legend{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.legend-box{border:1px solid var(--grid);padding:8px;font-size:12px}.legend-box h3{margin:0 0 6px;font:800 13px Arial}.rc-table{width:100%;border-collapse:collapse;font-family:Arial,Helvetica,sans-serif}.rc-table th,.rc-table td{border:1px solid var(--grid);padding:4px 5px;font-size:12px;vertical-align:top}.rc-table th{background:#d9d9d9;font-weight:800;text-align:left}.rc-table .center{text-align:center}.elementary-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}.subject-card{border:1px solid var(--grid);break-inside:avoid}.subject-title{background:#d9d9d9;border-bottom:1px solid var(--grid);padding:5px 7px;font:800 13px Arial}.subject-card table td,.subject-card table th{font-size:10px;padding:3px}.college-head{display:grid;grid-template-columns:112px 1fr;gap:18px;align-items:center;text-align:center;margin:8px 20px 18px}.college-school{font:900 23px Georgia,serif;text-transform:uppercase;margin:0}.college-title{font:800 16px Georgia,serif;text-transform:uppercase;margin:4px 0}.college-info{white-space:pre-line;font:700 12px Georgia,serif}.college-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 0 14px}.summary-box{border:1px solid var(--grid);padding:8px;min-height:48px}.summary-box b{display:block;font-size:11px}.dates-title{text-align:center;border:1px solid var(--grid);color:#6f93c7;font:900 33px Arial,sans-serif;padding:5px;margin:0 0 4px}.dates-year{text-align:center;font:400 28px Arial;margin:0 0 20px   <script>
    const $ = (id) => document.getElementById(id);
    const text = (id) => ($(id)?.value || "").trim();
    const fields = ["version","documentTitle","watermarkMode","schoolName","district","schoolYear","termName","schoolInfo","teacher","studentName","gradeLevel","studentId","attendance","gpa","credits","labelStudent","labelTeacher","labelGrade","labelId","labelSubject","labelSkill","labelQ1","labelQ2","labelQ3","labelQ4","labelFinal","labelComments","labelAttendance","labelGpa","labelCredits","labelSignature","labelLegend","bottomNotice","notes"];
    let logoData = "";
    let items = [
      { category:"Language Arts", skill:"Foundational Skills", q1:"3", q2:"3", q3:"", q4:"", final:"", comments:"Uses template wording effectively.", credits:"", grade:"A" },
      { category:"Mathematics", skill:"Operations and Algebraic Thinking", q1:"3", q2:"4", q3:"", q4:"", final:"", comments:"Builds clean editable form sections.", credits:"", grade:"A" },
      { category:"Science", skill:"Next Generation Science Standards", q1:"2", q2:"3", q3:"", q4:"", final:"", comments:"Reviews details and catches layout issues.", credits:"", grade:"B" },
      { category:"Social Emotional Learning", skill:"Responsible Decision Making", q1:"3", q2:"3", q3:"", q4:"", final:"", comments:"Collaborates well during form reviews.", credits:"", grade:"A" }
    ];
    const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
    const attr = (value) => esc(value).replace(/`/g,"&#96;");
    const label = (id, fallback) => text(id) || fallback;
    function optional(labelText, value){ return value ? `<div class="meta-item"><b>${esc(labelText)}</b>${esc(value)}</div>` : ""; }
    function logo(className="logo"){ if(logoData) return `<div class="${className}"><img alt="Uploaded logo" src="${logoData}"></div>`; const initials = text("schoolName").split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase(); return `<div class="${className}">${esc(initials || "RC")}</div>`; }
    function renderItemControls(){ $("itemEditor").innerHTML=""; items.forEach((item,index)=>{ const card=document.createElement("div"); card.className="item-card"; card.innerHTML=`<div class="item-head"><strong>Row ${index+1}</strong><button class="danger" type="button" data-remove="${index}">Remove</button></div><div class="grid"><label>Category<input data-item="${index}" data-key="category" value="${attr(item.category)}"></label><label>Skill / Class<input data-item="${index}" data-key="skill" value="${attr(item.skill)}"></label><label>Q1 / Sem 1<input data-item="${index}" data-key="q1" value="${attr(item.q1)}"></label><label>Q2 / Sem 2<input data-item="${index}" data-key="q2" value="${attr(item.q2)}"></label><label>Q3<input data-item="${index}" data-key="q3" value="${attr(item.q3)}"></label><label>Q4<input data-item="${index}" data-key="q4" value="${attr(item.q4)}"></label><label>Final<input data-item="${index}" data-key="final" value="${attr(item.final)}"></label><label>Credits<input data-item="${index}" data-key="credits" value="${attr(item.credits)}"></label><label>Grade<input data-item="${index}" data-key="grade" value="${attr(item.grade)}"></label><label>Comments<textarea data-item="${index}" data-key="comments">${esc(item.comments)}</textarea></label></div>`; $("itemEditor").appendChild(card); }); }
    function applyShell(){ const rc=$("reportCard"); const version=text("version") || "elementary"; rc.className = `sheet ${version}`; const mode=text("watermarkMode"); const watermark = mode === "none" ? "" : mode === "sample" ? "Sample" : "Unofficial"; rc.dataset.watermark = watermark; rc.classList.toggle("no-watermark", !watermark); $("sampleStrip").textContent = text("bottomNotice") || "Sample / Not Valid For Verification"; }
    function grouped(){ return items.reduce((map,item)=>{ const key=item.category || ""; if(!map[key]) map[key]=[]; map[key].push(item); return map; },{}); }
    function renderHeader(extraClass="") { return `<header class="rc-header ${extraClass}">${logo(extraClass.includes("college") ? "logo round" : "logo")}<h1 class="doc-title">${esc(text("documentTitle"))}</h1>${text("schoolName") ? `<div class="sub-title">${esc(text("schoolName"))}</div>` : ""}${text("schoolYear") ? `<div class="sub-title">${esc(text("schoolYear"))}</div>` : ""}</header>`; }
    function renderMeta(){ return `<section class="meta-grid">${optional(label("labelStudent","Student"),text("studentName"))}${optional(label("labelTeacher","Teacher"),text("teacher"))}${optional(label("labelGrade","Grade"),text("gradeLevel"))}${optional(label("labelId","ID#"),text("studentId"))}${optional("School / District",text("district"))}${optional("Term",text("termName"))}</section>`; }
    function renderElementary(){ const groups=grouped(); const cards=Object.keys(groups).map(cat=>`<section class="subject-card"><div class="subject-title">${esc(cat)}</div><table class="rc-table"><thead><tr><th>${esc(label("labelSkill","Skill"))}</th><th class="center">${esc(label("labelQ1","1"))}</th><th class="center">${esc(label("labelQ2","2"))}</th><th class="center">${esc(label("labelQ3","3"))}</th><th class="center">${esc(label("labelQ4","4"))}</th></tr></thead><tbody>${groups[cat].map(i=>`<tr><td>${esc(i.skill)}${i.comments?`<br>${esc(i.comments)}`:""}</td><td class="center">${esc(i.q1)}</td><td class="center">${esc(i.q2)}</td><td class="center">${esc(i.q3)}</td><td class="center">${esc(i.q4)}</td></tr>`).join("")}</tbody></table></section>`).join(""); return `${renderHeader()}${renderMeta()}<section class="legend"><div class="legend-box"><h3>${esc(label("labelLegend","Progress Indicators"))}</h3>4 - Exceeds Standards<br>3 - Meets Standards<br>2 - Working Towards Standards<br>1 - Not Meeting Standards</div><div class="legend-box"><h3>${esc(label("labelAttendance","Attendance"))}</h3>${esc(text("attendance"))}</div></section><section class="elementary-grid">${cards}</section>${renderNotesAndSignature()}`; }
    function renderHighSchool(){ return `${renderHeader()}${renderMeta()}<table class="rc-table"><thead><tr><th>${esc(label("labelSubject","Subject"))}</th><th>${esc(label("labelSkill","Course / Class"))}</th><th>${esc(label("labelQ1","Q1"))}</th><th>${esc(label("labelQ2","Q2"))}</th><th>${esc(label("labelQ3","Q3"))}</th><th>${esc(label("labelQ4","Q4"))}</th><th>${esc(label("labelFinal","Final"))}</th><th>${esc(label("labelComments","Comments"))}</th></tr></thead><tbody>${items.map(i=>`<tr><td>${esc(i.category)}</td><td>${esc(i.skill)}</td><td class="center">${esc(i.q1)}</td><td class="center">${esc(i.q2)}</td><td class="center">${esc(i.q3)}</td><td class="center">${esc(i.q4)}</td><td class="center">${esc(i.final || i.grade)}</td><td>${esc(i.comments)}</td></tr>`).join("")}</tbody></table><section class="college-summary"><div class="summary-box"><b>${esc(label("labelGpa","GPA"))}</b>${esc(text("gpa"))}</div><div class="summary-box"><b>${esc(label("labelCredits","Credits"))}</b>${esc(text("credits"))}</div><div class="summary-box"><b>${esc(label("labelAttendance","Attendance"))}</b>${esc(text("attendance"))}</div><div class="summary-box"><b>${esc(text("termName"))}</b>${esc(text("schoolYear"))}</div></section>${renderNotesAndSignature()}`; }
    function renderCollege(){ return `<header class="college-head">${logo("logo round")}<div><h1 class="college-school">${esc(text("schoolName"))}</h1><h2 class="college-title">${esc(text("documentTitle"))}</h2><div class="college-info">${esc([text("district"),text("schoolInfo"),text("schoolYear")].filter(Boolean).join("\n"))}</div></div></header>${renderMeta()}<section class="college-summary"><div class="summary-box"><b>${esc(label("labelGpa","GPA"))}</b>${esc(text("gpa"))}</div><div class="summary-box"><b>${esc(label("labelCredits","Credits"))}</b>${esc(text("credits"))}</div><div class="summary-box"><b>${esc(label("labelAttendance","Attendance"))}</b>${esc(text("attendance"))}</div><div class="summary-box"><b>${esc(text("termName") || "Semester")}</b>${esc(text("schoolYear"))}</div></section><table class="rc-table"><thead><tr><th>${esc(label("labelSubject","Department"))}</th><th>${esc(label("labelSkill","Course"))}</th><th>${esc(label("labelQ1","Semester 1"))}</th><th>${esc(label("labelQ2","Semester 2"))}</th><th>${esc(label("labelFinal","Final"))}</th><th>${esc(label("labelCredits","Credits"))}</th><th>${esc(label("labelGpa","Grade"))}</th><th>${esc(label("labelComments","Comments"))}</th></tr></thead><tbody>${items.map(i=>`<tr><td>${esc(i.category)}</td><td>${esc(i.skill)}</td><td class="center">${esc(i.q1)}</td><td class="center">${esc(i.q2)}</td><td class="center">${esc(i.final)}</td><td class="center">${esc(i.credits)}</td><td class="center">${esc(i.grade)}</td><td>${esc(i.comments)}</td></tr>`).join("")}</tbody></table>${renderNotesAndSignature()}`; }
    function renderDatesStyle(){ return `<h1 class="dates-title">${esc(text("documentTitle"))}</h1><div class="dates-year">${esc(text("schoolYear"))}</div><table class="rc-table"><thead><tr><th>Cycle</th><th>Dates</th><th># of Days</th><th>Progress Report Date</th><th>Report Card Date</th></tr></thead><tbody>${items.map(i=>`<tr><td>${esc(i.category)}</td><td>${esc(i.skill)}</td><td>${esc(i.q1)}</td><td>${esc(i.q2)}</td><td>${esc(i.comments)}</td></tr>`).join("")}</tbody></table>${renderNotesAndSignature()}`; }
        function setValue(id, value){ if($(id)) $(id).value = value; }
