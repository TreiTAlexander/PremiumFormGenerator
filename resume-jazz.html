<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Resume — Jazz</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Exo+2:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=Syne:wght@400;600;700;800&family=Fragment+Mono&family=Abril+Fatface&family=Righteous&display=swap" rel="stylesheet"><style>
:root{--black:#02030c;--blue:#1a7fff;--cyan:#40c8ff;--gold:#ffd438;--gold2:#ffb800;--white:#eef2ff;--gray:#6878a0;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--white);font-family:'Exo 2',sans-serif;overflow-x:hidden;min-height:100vh;}
#space-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,20,0.03) 3px,rgba(0,0,20,0.03) 4px);pointer-events:none;z-index:998;}
nav{position:sticky;top:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:rgba(2,3,12,0.92);backdrop-filter:blur(24px);border-bottom:1px solid rgba(26,127,255,0.15);}
.nav-logo{height:28px;filter:hue-rotate(218deg) saturate(2) brightness(1.15);}
.nav-back{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border-radius:4px;border:1px solid rgba(64,200,255,0.28);background:0;color:var(--cyan);cursor:pointer;text-decoration:none;font-family:'Exo 2';}
.nav-ft{font-family:'Playfair Display',serif;font-size:14px;font-weight:900;color:var(--gold);}
.page{position:relative;z-index:1;padding:20px 16px 60px;}
.page-header{text-align:center;padding:16px 0 20px;}
.page-eye{font-size:9px;font-weight:700;letter-spacing:5px;color:var(--blue);text-transform:uppercase;margin-bottom:6px;}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,28px);font-weight:900;color:var(--white);}
.page-title span{color:var(--gold);}
.page-rule{width:36px;height:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;margin:10px auto 0;}
.editor{display:flex;flex-direction:column;gap:14px;max-width:760px;margin:0 auto;}
.panel{background:rgba(4,6,20,0.85);border:1px solid rgba(26,127,255,0.16);border-radius:12px;padding:18px;backdrop-filter:blur(16px);}
.panel h3{font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--blue);margin-bottom:14px;}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;border:1px solid rgba(26,127,255,0.2);border-radius:5px;padding:10px 12px;font-size:13px;font-family:'DM Mono',monospace;color:var(--white);background:rgba(2,3,12,0.7);outline:none;-webkit-appearance:none;resize:vertical;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(64,200,255,0.07);}
.fg select option{background:#05081a;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.sdiv{font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(104,120,160,0.45);margin:14px 0 10px;padding-top:14px;border-top:1px solid rgba(26,127,255,0.08);}
.preview-panel{background:rgba(4,6,20,0.85);border:1px solid rgba(26,127,255,0.16);border-radius:12px;padding:18px;backdrop-filter:blur(16px);}
.preview-panel h3{font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--blue);margin-bottom:12px;}
.doc-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.action-row{display:flex;gap:10px;margin-top:14px;}
.btn-print{flex:1;padding:12px;border-radius:6px;font-family:'Exo 2';font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:1px solid rgba(64,200,255,0.28);background:0;color:var(--cyan);}
.btn-dl{flex:1;padding:12px;border-radius:6px;font-family:'Exo 2';font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--black);}
.add-btn{width:100%;padding:9px;border:1px dashed rgba(26,127,255,0.25);background:0;color:var(--gray);border-radius:5px;cursor:pointer;font-size:11px;font-family:'Exo 2';font-weight:600;letter-spacing:2px;margin-top:4px;}
.rm-btn{background:0;border:1px solid rgba(255,58,92,0.3);color:rgba(255,58,92,0.6);padding:7px 10px;border-radius:4px;cursor:pointer;font-size:11px;white-space:nowrap;}
.entry-row{display:flex;flex-direction:column;gap:6px;padding:10px;border:1px solid rgba(26,127,255,0.1);border-radius:6px;margin-bottom:8px;}
/* Color picker row */
.color-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.color-swatch-group{display:flex;flex-direction:column;gap:4px;}
.color-swatch-group label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);}
.color-swatch-group input[type=color]{width:44px;height:32px;border:1px solid rgba(26,127,255,0.2);border-radius:4px;cursor:pointer;background:0;padding:2px;}

.btn-img{flex:1;min-width:80px;padding:12px;border-radius:6px;font-family:'Exo 2';font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid rgba(64,200,255,0.28);background:rgba(26,127,255,0.1);color:var(--white);}
.btn-img:hover{background:rgba(64,200,255,0.15);}

@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body { background: white !important; margin: 0 !important; padding: 0 !important; }
  #space-canvas, canvas, .scanlines { display: none !important; }
  nav, .action-row, .panel, .page-header { display: none !important; }
  body::after { display: none !important; }
  .page { padding: 0 !important; }
  .editor { display: block !important; max-width: 100% !important; }
  .preview-panel { border: none !important; background: transparent !important; padding: 0 !important; box-shadow: none !important; backdrop-filter: none !important; }
  .preview-panel h3 { display: none !important; }
  .doc-scroll { overflow: visible !important; }
}

.rj{width:680px;min-width:680px;background:var(--rj-bg,#faf8f2);font-family:'Cormorant Garamond',serif;color:var(--rj-text,#1a1208);box-shadow:0 20px 70px rgba(0,0,0,0.7);position:relative;overflow:hidden;}
.rj-top{background:var(--rj-primary,#1a0a00);padding:28px 30px 22px;position:relative;overflow:hidden;}
.rj-top-deco{position:absolute;right:-20px;top:-20px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(200,140,20,0.2),transparent 70%);pointer-events:none;}
.rj-top-wave{position:absolute;bottom:0;left:0;right:0;height:20px;background:var(--rj-bg,#faf8f2);clip-path:ellipse(55% 100% at 50% 100%);}
.rj-name{font-family:'Abril Fatface',serif;font-size:46px;color:#fff;line-height:0.95;letter-spacing:-0.5px;margin-bottom:5px;position:relative;z-index:1;}
.rj-title{font-size:9px;font-family:'Fragment Mono',monospace;color:var(--rj-accent,#c88c14);letter-spacing:4px;text-transform:uppercase;line-height:2;position:relative;z-index:1;}
.rj-contact-strip{display:flex;flex-wrap:wrap;gap:0;border-top:1px solid rgba(200,140,20,0.3);margin-top:14px;position:relative;z-index:1;}
.rj-contact-item{font-size:7.5px;font-family:'Fragment Mono',monospace;color:rgba(255,255,255,0.4);padding:7px 12px;border-right:1px solid rgba(200,140,20,0.2);}
.rj-body{display:grid;grid-template-columns:175px 1fr;}
.rj-side{padding:20px 16px 0;background:rgba(26,10,0,0.04);border-right:2px solid var(--rj-accent,#c88c14);}
.rj-main{padding:20px 22px 0;}
.rj-sec{margin-bottom:18px;}
.rj-sec-title{font-family:'Righteous',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--rj-primary,#1a0a00);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.rj-sec-title::after{content:'';flex:1;height:1px;background:var(--rj-accent,#c88c14);opacity:0.4;}
.rj-summary{font-size:10px;color:#555;line-height:1.9;font-style:italic;}
.rj-job{margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid rgba(200,140,20,0.12);}
.rj-job-title{font-size:12px;font-weight:700;color:var(--rj-primary,#1a0a00);margin-bottom:1px;}
.rj-job-meta{font-size:8px;font-family:'Fragment Mono',monospace;color:var(--rj-accent,#c88c14);letter-spacing:1px;margin-bottom:2px;}
.rj-job-co{font-size:8.5px;color:#888;font-style:italic;margin-bottom:5px;}
.rj-bullet{font-size:9px;color:#555;line-height:1.8;padding-left:12px;position:relative;}
.rj-bullet::before{content:'♩';position:absolute;left:0;color:var(--rj-accent,#c88c14);font-size:9px;}
.rj-skill{font-size:8px;font-family:'Fragment Mono',monospace;color:var(--rj-primary,#1a0a00);border-bottom:1px solid rgba(200,140,20,0.3);padding:4px 0;margin-bottom:2px;}
.rj-edu-deg{font-size:10px;font-weight:700;color:var(--rj-primary,#1a0a00);}
.rj-edu-school{font-size:8.5px;color:#888;font-style:italic;}
.rj-edu-year{font-size:8px;font-family:'Fragment Mono',monospace;color:var(--rj-accent,#c88c14);margin-bottom:8px;}
.rj-cert{font-size:8px;font-family:'Fragment Mono',monospace;color:#666;line-height:2;padding-left:8px;position:relative;}
.rj-cert::before{content:'♪';position:absolute;left:0;color:var(--rj-accent,#c88c14);}
.rj-footer{background:var(--rj-primary,#1a0a00);padding:7px 22px;display:flex;align-items:center;justify-content:space-between;}
.fp-label{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.18);font-family:'DM Mono',monospace;}
.mascot-img{height:34px;opacity:0.22;object-fit:contain;}

<script>
const cv=document.getElementById('space-canvas'),ct=cv.getContext('2d');
let W,H,st=[],gd=[];
function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;ini();}
function rnd(a,b){return a+Math.random()*(b-a);}
function ini(){st=[];for(let i=0;i<180;i++){const r=Math.random()<0.04?rnd(1.4,2.4):rnd(0.15,1.1);st.push({x:rnd(0,W),y:rnd(0,H),r,h:Math.random()<0.08?44:rnd(210,230),s:rnd(0,14),b:rnd(0.3,1),ts:rnd(0.003,0.011),tp:rnd(0,Math.PI*2)});}gd=[];for(let i=0;i<14;i++){gd.push({x:rnd(0,W),y:rnd(0,H),r:rnd(0.5,1.4),b:rnd(0.1,0.45),ts:rnd(0.004,0.014),tp:rnd(0,Math.PI*2),dx:rnd(-0.04,0.04),dy:rnd(-0.03,0.03)});}}
function drawBg(t){ct.clearRect(0,0,W,H);const bg=ct.createRadialGradient(W/2,0,0,W/2,H/2,Math.max(W,H));bg.addColorStop(0,'#091230');bg.addColorStop(0.35,'#050818');bg.addColorStop(1,'#02030c');ct.fillStyle=bg;ct.fillRect(0,0,W,H);st.forEach(s=>{const a=s.b*(0.5+0.5*Math.sin(t*s.ts+s.tp));ct.fillStyle='hsla('+s.h+','+s.s+'%,96%,'+a+')';ct.beginPath();ct.arc(s.x,s.y,s.r,0,Math.PI*2);ct.fill();});gd.forEach(g=>{g.x+=g.dx;g.y+=g.dy;if(g.x<-5)g.x=W+5;if(g.x>W+5)g.x=-5;if(g.y<-5)g.y=H+5;if(g.y>H+5)g.y=-5;const a=g.b*(0.4+0.6*Math.sin(t*g.ts+g.tp));ct.fillStyle='rgba(255,218,56,'+a+')';ct.beginPath();ct.arc(g.x,g.y,g.r,0,Math.PI*2);ct.fill();});requestAnimationFrame(drawBg);}
window.addEventListener('resize',rsz);rsz();requestAnimationFrame(drawBg);

function checkAccess(){
  var exp=localStorage.getItem('fp_premium_exp');
  if(exp && parseInt(exp)>Date.now()) return true;
  return false;
}
function requireAccess(action){
  if(checkAccess()){ action(); return; }
  if(confirm('This feature requires a Form Porn account.\n\nClick OK to sign up or use a promo code — from $3 per form!')){
    window.location.href='/pricing.html';
  }
}

function dlPDF(id){
  id=id||document.querySelector('[id$="-doc"]')||document.getElementById('resume-doc');
  var el=typeof id==='string'?document.getElementById(id):id;
  if(!el){window.print();return;}
  requireAccess(function(){
    if(typeof html2canvas==='undefined'){
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload=function(){_capturePDF(el);};
      document.head.appendChild(s);
    } else { _capturePDF(el); }
  });
}
function _capturePDF(el){
  html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff',logging:false}).then(function(c){
    var a=document.createElement('a');
    a.download='formporn-document.pdf';
    a.href=c.toDataURL('image/jpeg',0.95);
    a.click();
  });
}
function dlPNG(id){
  var el=typeof id==='string'?document.getElementById(id):id;
  if(!el)return;
  requireAccess(function(){
    if(typeof html2canvas==='undefined'){
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload=function(){_cap(el,'png');};document.head.appendChild(s);
    } else { _cap(el,'png'); }
  });
}
function dlJPEG(id){
  var el=typeof id==='string'?document.getElementById(id):id;
  if(!el)return;
  requireAccess(function(){
    if(typeof html2canvas==='undefined'){
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload=function(){_cap(el,'jpg');};document.head.appendChild(s);
    } else { _cap(el,'jpg'); }
  });
}
function _cap(el,fmt){
  html2canvas(el,{scale:fmt==='png'?3:2,useCORS:true,backgroundColor:'#fff',logging:false}).then(function(c){
    var a=document.createElement('a');
    a.download='formporn.'+fmt;
    a.href=c.toDataURL(fmt==='png'?'image/png':'image/jpeg',0.95);
    a.click();
  });
}
function downloadPDF(id){ dlPDF(id); }
function downloadPNG(id){ dlPNG(id); }
function downloadJPEG(id){ dlJPEG(id); }

let jobs=[
  {title:'[Job Title]',company:'[Company Name]',loc:'[City, State]',dates:'[Start] — [End]',bullets:'[Describe your key achievement or responsibility]\n[Describe another accomplishment with measurable impact]\n[List tools or methods used]'},
  {title:'[Previous Job Title]',company:'[Previous Company]',loc:'[City, State]',dates:'[Start] — [End]',bullets:'[Key responsibility or achievement]\n[Another accomplishment]'}
];
let edu=[
  {deg:'[Degree] — [Field of Study]',school:'[University / College Name]',year:'[Year]'},
  {deg:'[Degree] — [Field of Study]',school:'[School Name]',year:'[Year]'}
];
function v(id){return document.getElementById(id)?document.getElementById(id).value:'';}
function c(id){return document.getElementById(id)?document.getElementById(id).value:'#000000';}
function inp(label,val,cb,flex){return '<div style=\"flex:'+(flex||1)+';min-width:0;\"><div style=\"font-size:8px;color:rgba(104,120,160,0.7);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;\">'+(label||'')+'</div><input value=\"'+val.replace(/"/g,'&quot;').replace(/\\/g,'\\\\')+'\" oninput=\"'+cb+';update()\" style=\"width:100%;border:1px solid rgba(26,127,255,0.2);border-radius:4px;padding:8px;font-size:12px;font-family:DM Mono,monospace;color:var(--white);background:rgba(2,3,12,0.7);outline:none;\"></div>';}
function ta(label,val,cb){return '<div><div style=\"font-size:8px;color:rgba(104,120,160,0.7);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;\">'+(label||'')+'</div><textarea rows=\"3\" oninput=\"'+cb+';update()\" style=\"width:100%;border:1px solid rgba(26,127,255,0.2);border-radius:4px;padding:8px;font-size:12px;font-family:DM Mono,monospace;color:var(--white);background:rgba(2,3,12,0.7);outline:none;resize:vertical;\">'+(val||'')+'</textarea></div>';}
function renderJobs(){
  const c2=document.getElementById('jobs-ct');if(!c2)return;c2.innerHTML='';
  jobs.forEach((j,i)=>{
    const d=document.createElement('div');d.className='entry-row';
    d.innerHTML='<div style=\"display:flex;gap:6px;align-items:flex-start;\">'+inp('Job Title',j.title,'jobs['+i+'].title=this.value',2)+'<button class=\"rm-btn\" onclick=\"jobs.splice('+i+',1);renderJobs();update()\">✕</button></div>'
      +'<div style=\"display:flex;gap:6px;\">'+inp('Company',j.company,'jobs['+i+'].company=this.value')+inp('Location',j.loc,'jobs['+i+'].loc=this.value')+inp('Dates',j.dates,'jobs['+i+'].dates=this.value')+'</div>'
      +ta('Bullet Points (one per line)',j.bullets,'jobs['+i+'].bullets=this.value');
    c2.appendChild(d);
  });
}
function addJob(){jobs.push({title:'',company:'',loc:'',dates:'',bullets:''});renderJobs();update();}
function renderEdu(){
  const c2=document.getElementById('edu-ct');if(!c2)return;c2.innerHTML='';
  edu.forEach((e,i)=>{
    const d=document.createElement('div');d.className='entry-row';
    d.innerHTML='<div style=\"display:flex;gap:6px;align-items:flex-start;\">'+inp('Degree / Program',e.deg,'edu['+i+'].deg=this.value',2)+'<button class=\"rm-btn\" onclick=\"edu.splice('+i+',1);renderEdu();update()\">✕</button></div>'
      +'<div style=\"display:flex;gap:6px;\">'+inp('School',e.school,'edu['+i+'].school=this.value',2)+inp('Year',e.year,'edu['+i+'].year=this.value',0.5)+'</div>';
    c2.appendChild(d);
  });

function update(){
  const pri=c('c-primary'),acc=c('c-accent'),bg=c('c-bg'),txt=c('c-text');
  const skills=v('f-skills').split(',').map(s=>s.trim()).filter(Boolean);
  const titles=v('f-title').split('\n').filter(Boolean);
  const certs=v('f-certs').split('\n').filter(Boolean);
  let jH=jobs.map(j=>{const b=j.bullets.split('\n').filter(Boolean).map(x=>'<div class="rj-bullet">'+x+'</div>').join('');return '<div class="rj-job"><div class="rj-job-title">'+j.title+'</div><div class="rj-job-meta">'+j.dates+'</div><div class="rj-job-co">'+j.company+(j.loc?' · '+j.loc:'')+'</div>'+b+'</div>';}).join('');
  let eH=edu.map(e=>'<div><div class="rj-edu-deg">'+e.deg+'</div><div class="rj-edu-school">'+e.school+'</div>'+(e.year?'<div class="rj-edu-year">'+e.year+'</div>':'')+'</div>').join('');
  document.getElementById('resume-doc').innerHTML=`<div class="rj" style="background:${bg};color:${txt};">
    <div class="rj-top" style="background:${pri};">
      <div class="rj-top-deco"></div>
      <div class="rj-top-wave" style="background:${bg};"></div>
      <div class="rj-name">${v('f-name')||'YOUR NAME'}</div>
      <div class="rj-title" style="color:${acc};">${titles.join(' · ')}</div>
      <div class="rj-contact-strip">
        <div class="rj-contact-item">${v('f-phone')}</div>
        <div class="rj-contact-item">${v('f-email')}</div>
        <div class="rj-contact-item">${v('f-loc')}</div>
        <div class="rj-contact-item">${v('f-link')}</div>
      </div>
    </div>
    <div class="rj-body">
      <div class="rj-side" style="border-right-color:${acc};">
        <div class="rj-sec"><div class="rj-sec-title" style="color:${pri};">Skills</div>${skills.map(s=>'<div class="rj-skill" style="color:${pri};">'+s+'</div>').join('')}</div>
        <div class="rj-sec"><div class="rj-sec-title" style="color:${pri};">Education</div>${eH}</div>
        <div class="rj-sec"><div class="rj-sec-title" style="color:${pri};">Certs</div>${certs.map(x=>'<div class="rj-cert">'+x+'</div>').join('')}</div>
      </div>
      <div class="rj-main">
        <div class="rj-sec"><div class="rj-sec-title" style="color:${pri};">Profile</div><div class="rj-summary">${v('f-summary')}</div></div>
        <div class="rj-sec"><div class="rj-sec-title" style="color:${pri};">Experience</div>${jH}</div>
      </div>
    </div>
    <div class="rj-footer" style="background:${pri};"><span class="fp-label">fp</span><img class="mascot-img" src="${MASCOT_SRC}" alt=""></div>
  </div>`;
}
renderJobs();renderEdu();update();

function downloadPDF(id) { window.print(); }
function downloadPNG(docId) {
  const el = document.getElementById(docId);
  if(!el){alert('Generate a document first.');return;}
  html2canvas(el,{scale:3,useCORS:true,backgroundColor:'#ffffff',logging:false}).then(c=>{
    const a=document.createElement('a');a.download='formporn.png';a.href=c.toDataURL('image/png',1.0);a.click();
  }).catch(()=>alert('Try PDF instead.'));
}
function downloadJPEG(docId) {
  const el = document.getElementById(docId);
  if(!el){alert('Generate a document first.');return;}
  html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false}).then(c=>{
    const a=document.createElement('a');a.download='formporn.jpg';a.href=c.toDataURL('image/jpeg',0.95);a.click();
  }).catch(()=>alert('Try PDF instead.'));
}
</script></body></html>
