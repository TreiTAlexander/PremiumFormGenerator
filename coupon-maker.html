<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coupon Maker | Form Porn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;600;700;800;900&family=DM+Mono:wght@400;500&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#030713;--panel:#071326;--gold:#ffcf2e;--cyan:#2fb7ff;--text:#eaf4ff;--muted:#9cb3ce;--ink:#101010;--paper:#fff400;--accent:#ed174f;--deep:#1d1a54}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);background:radial-gradient(circle at top,#0b1f3d 0,#030713 46%,#01030a 100%);font-family:Barlow,Arial,sans-serif}.topbar{height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;border-bottom:1px solid rgba(42,149,222,.28);background:rgba(1,4,13,.84);position:sticky;top:0;z-index:10}.brand,.home{color:#23b8ff;text-decoration:none;text-transform:uppercase;letter-spacing:.32em;font:800 13px Barlow,sans-serif}.title{color:var(--gold);text-align:center;font:900 16px Barlow,sans-serif}.wrap{width:min(1480px,calc(100vw - 24px));margin:20px auto 40px;display:grid;grid-template-columns:minmax(320px,460px) minmax(0,1fr);gap:18px;align-items:start}.panel{border:1px solid rgba(38,142,219,.35);background:rgba(4,10,24,.86);border-radius:8px;box-shadow:0 20px 50px rgba(0,0,0,.35)}.controls{padding:18px;position:sticky;top:88px;max-height:calc(100vh - 108px);overflow:auto}.preview-panel{padding:18px;overflow:hidden}.eyebrow{color:var(--cyan);text-transform:uppercase;letter-spacing:.46em;font:800 12px Barlow,sans-serif;margin:0 0 14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:grid;gap:6px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font:800 10px Barlow,sans-serif}input,textarea,select{width:100%;border:1px solid rgba(41,159,234,.38);border-radius:6px;background:#06111f;color:#eef7ff;padding:10px 11px;font:600 14px Barlow,sans-serif;outline:none}input[type=color]{height:42px;padding:4px}textarea{min-height:72px;resize:vertical}.section{border-top:1px solid rgba(41,159,234,.22);padding-top:14px;margin-top:14px}.offer-editor{display:grid;gap:10px}.offer-card{border:1px solid rgba(41,159,234,.26);border-radius:8px;padding:10px;background:rgba(7,20,38,.8);display:grid;gap:8px}.offer-head{display:flex;align-items:center;justify-content:space-between;gap:8px}.offer-head strong{color:var(--gold);letter-spacing:.12em;text-transform:uppercase;font-size:11px}button{border:1px solid rgba(41,159,234,.48);background:#061322;color:#eaf7ff;border-radius:6px;padding:11px 12px;font:900 12px Barlow,sans-serif;text-transform:uppercase;letter-spacing:.18em;cursor:pointer}button.primary{border-color:transparent;background:var(--gold);color:#01040b}button.danger{padding:7px 9px;color:#ff9fa9;border-color:rgba(255,91,113,.35)}.notice{margin:12px 0 0;color:#ffcf2e;font:700 12px/1.4 Barlow,sans-serif}.stage{overflow:auto;padding:14px;background:#020611;border:1px solid rgba(41,159,234,.22);border-radius:8px}.coupon-sheet{width:940px;min-height:1180px;margin:0 auto;background:#fff;box-shadow:0 28px 65px rgba(0,0,0,.42);position:relative;color:var(--ink);padding:18px;font-family:Barlow,Arial,sans-serif}.sample-strip{text-align:center;color:#b32030;border-top:2px solid rgba(179,32,48,.58);border-bottom:2px solid rgba(179,32,48,.58);padding:10px 8px;text-transform:uppercase;letter-spacing:.2em;font:900 13px Barlow,sans-serif;margin:16px auto 0;width:940px;background:#fbfbf7}.logo{display:grid;place-items:center;overflow:hidden;font-weight:900}.logo img,.product img{width:100%;height:100%;object-fit:contain}.barcode{height:64px;background:repeating-linear-gradient(90deg,#111 0 3px,#fff 3px 5px,#111 5px 7px,#fff 7px 12px,#111 12px 14px,#fff 14px 18px);border:5px solid #fff;box-shadow:inset 0 0 0 1px #111}.qr{width:78px;height:78px;background:#fff;padding:6px;display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(7,1fr);gap:2px}.qr span{background:#111}.barcode-label{font:900 11px 'DM Mono',monospace;text-align:center;letter-spacing:.08em}.hidden{display:none!important}.style-grocery{background:var(--accent);display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.style-grocery .hero{grid-column:1/-1;background:var(--deep);color:#fff;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:22px;min-height:190px}.style-grocery .hero h1{font-size:54px;line-height:.9;margin:0;text-transform:uppercase}.style-grocery .hero .kicker{font-size:24px}.style-grocery .coupon{background:var(--paper);border:4px dashed var(--accent);min-height:260px;padding:12px;display:grid;grid-template-columns:1fr 110px;gap:8px;position:relative}.style-grocery .value{font-size:58px;font-weight:900;color:var(--accent);line-height:.8}.style-grocery .desc{font-size:20px;font-weight:900;line-height:1}.style-grocery .fine{font-size:10px;line-height:1.15}.style-grocery .product{height:100px}.style-grocery .barcode-wrap{grid-column:1/-1}.style-super{background:#0d597d;padding:0}.style-super .hero{background:#083f5e;color:#fff;text-align:center;padding:20px;border:8px solid #32d0ff}.style-super .hero h1{font-size:36px;margin:0;text-transform:uppercase}.style-super .hero .big{font-size:132px;font-weight:900;line-height:.8}.style-super .hero .sub{font-size:42px;font-weight:900}.style-super .offer-row{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;background:#ecf8ff;margin:16px;border:4px solid #32d0ff;padding:12px}.style-super .product{height:240px}.style-super .coupon{padding:12px}.style-super .value{font-size:62px;font-weight:900;color:#0a668d}.style-mailer{padding:0;background:#fff}.style-mailer .top{display:grid;grid-template-columns:1.4fr .9fr;background:#e9003f;color:#fff}.style-mailer .food-panel{min-height:320px;background:#111;display:grid;grid-template-columns:1fr 1.2fr;align-items:center;padding:24px}.style-mailer .food-panel h1{font-size:44px;line-height:.92;margin:0;text-transform:uppercase}.style-mailer .product{height:260px}.style-mailer .signup{padding:22px;text-align:center}.style-mailer .signup h2{font-size:32px;margin:0;text-transform:uppercase}.style-mailer .locations{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:4px solid #111;border-bottom:4px solid #111}.style-mailer .location{padding:16px;text-align:center;font-size:16px}.style-mailer .coupon-row{display:grid;grid-template-columns:repeat(3,1fr)}.style-mailer .coupon{border-right:2px dashed #999;padding:10px;min-height:170px}.style-mailer .coupon:last-child{border-right:0}.style-mailer .value{font-size:42px;color:#e9003f;font-weight:900}.style-app{background:#dff2f9;padding:14px}.style-app .hero{display:grid;grid-template-columns:1fr 90px;gap:12px;align-items:start}.style-app h1{font-size:35px;margin:0;line-height:1;text-transform:uppercase}.style-app .badge{background:#ffcc00;border-radius:999px;width:64px;height:64px;display:grid;place-items:center;font-weight:900}.style-app .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.style-app .coupon{background:#fff;border:3px solid #ffcc00;padding:10px;min-height:240px}.style-app .product{height:110px}.style-app .value{display:inline-block;background:#ffcc00;border-radius:999px;padding:8px 12px;font-size:24px;font-weight:900}.style-luxe{background:#faf7ef;padding:30px;color:#271d18;font-family:'Libre Baskerville',Georgia,serif}.style-luxe .hero{text-align:center;border:3px double #271d18;padding:24px}.style-luxe .hero h1{font-size:52px;margin:8px 0;text-transform:uppercase}.style-luxe .hero .big{font-size:76px}.style-luxe .tiles{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:20px}.style-luxe .coupon{border:2px solid #271d18;padding:18px;min-height:260px}.style-luxe .product{height:140px}.style-luxe .value{font-size:44px;font-weight:700}@media(max-width:980px){.wrap{grid-template-columns:1fr}.controls{position:static;max-height:none}.stage{padding:8px}}@media(max-width:560px){.topbar{padding:0 12px}.title{font-size:13px}.brand,.home{letter-spacing:.18em}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="topbar"><a class="brand" href="javascript:history.back()">Back</a><div class="title">Coupon Maker</div><a class="home" href="/">Home</a></header>
  <main class="wrap">
    <section class="panel controls">
      <p class="eyebrow">Coupon Maker</p>
      <div class="grid">
        <label>Style<select id="style"><option value="grocery" selected>Grocery Stack</option><option value="super">Super Coupon</option><option value="mailer">Restaurant Mailer</option><option value="app">App Deals</option><option value="luxe">Boutique / Luxe</option></select></label>
        <label>Barcode Type<select id="barcodeType"><option value="barcode" selected>Barcode</option><option value="qr">QR Style</option><option value="both">Both</option><option value="none">None</option></select></label>
        <label>Logo Upload<input id="logoInput" type="file" accept="image/*"></label>
        <label>Hero Product Upload<input id="heroImageInput" type="file" accept="image/*"></label>
        <label>Brand / Store<input id="brand" value="Form Porn Market"></label>
        <label>Headline<input id="headline" value="Plus an Extra $10 Off"></label>
        <label>Subheadline<input id="subheadline" value="Your next grocery run"></label>
        <label>Coupon Code<input id="couponCode" value="FP-23849286"></label>
        <label>Valid Dates<input id="validDates" value="Valid 8/01/26 thru 8/29/26"></label>
        <label>Background<input id="bgColor" type="color" value="#fff400"></label>
        <label>Accent<input id="accentColor" type="color" value="#ed174f"></label>
        <label>Dark Color<input id="darkColor" type="color" value="#1d1a54"></label>
      </div>
      <div class="section"><label>Fine Print<textarea id="finePrint">Sample promotional layout only. Not valid for purchase, redemption, reimbursement, or verification. One sample per preview.</textarea></label></div>
      <div class="section"><p class="eyebrow">Offers</p><div id="offerEditor" class="offer-editor"></div><button id="addOffer" class="primary" type="button">Add Offer</button></div>
      <p class="notice">Preview only for now. No download/export buttons added.</p>
    </section>
    <section class="panel preview-panel"><p class="eyebrow">Live Preview</p><div class="stage"><article id="couponSheet" class="coupon-sheet style-grocery"></article><div class="sample-strip">Sample / Not Valid For Verification</div></div></section>
  </main>
  <script>
    const $=id=>document.getElementById(id); const text=id=>($(id)?.value||"").trim(); const esc=v=>String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); const attr=v=>esc(v).replace(/`/g,"&#96;");
    const fields=["style","barcodeType","brand","headline","subheadline","couponCode","validDates","bgColor","accentColor","darkColor","finePrint"];
    let logoData="", heroData="";
    let offers=[
      {value:"$2", suffix:"off", title:"Your Produce Dept. Purchase", details:"Fresh picks, prepared trays, or pantry pairings", terms:"of $10 or More", image:"", code:"FP24501"},
      {value:"99¢", suffix:"", title:"Form Porn Sparkling Sips", details:"Assorted flavors and sizes", terms:"Limit 4 sample items", image:"", code:"FP24502"},
      {value:"15%", suffix:"off", title:"Everything in the Template Aisle", details:"Use online or in-store preview", terms:"3 days only", image:"", code:"FP24503"},
      {value:"$1", suffix:"off", title:"Snack Studio Favorites", details:"Editable sample product tile", terms:"With sample coupon", image:"", code:"FP24504"},
      {value:"BOGO", suffix:"", title:"Creative Combo Deal", details:"Buy one concept, add one revision", terms:"Preview offer only", image:"", code:"FP24505"},
      {value:"$5", suffix:"off", title:"Full Cart Form Bundle", details:"Multiple editable coupon layout", terms:"When you spend $25", image:"", code:"FP24506"}
    ];
    function barcodeBlock(code){ const type=text("barcodeType"); if(type==="none")return""; const bars=`<div class="barcode"></div><div class="barcode-label">${esc(code||text("couponCode"))}</div>`; const qr=`<div class="qr">${Array.from({length:49},(_,i)=>`<span style="opacity:${(i*7+i%5)%3===0?1:0}"></span>`).join("")}</div><div class="barcode-label">${esc(code||text("couponCode"))}</div>`; if(type==="qr")return qr; if(type==="both")return `<div style="display:flex;align-items:end;gap:8px">${bars}${qr}</div>`; return bars; }
    function logo(){ if(logoData)return`<div class="logo"><img src="${logoData}" alt="Uploaded logo"></div>`; return `<div class="logo">${esc(text("brand").split(/\s+/).slice(0,2).map(w=>w[0]).join("")||"FP")}</div>`; }
    function product(offer,hero=false){ const src=offer?.image||heroData; if(src)return`<div class="product"><img src="${src}" alt="Uploaded product"></div>`; return `<div class="product" style="display:grid;place-items:center;background:rgba(255,255,255,.5);border:2px dashed currentColor;font-weight:900;text-align:center;padding:8px">Product<br>Image</div>`; }
    function renderOfferControls(){ $("offerEditor").innerHTML=""; offers.forEach((o,i)=>{ const card=document.createElement("div"); card.className="offer-card"; card.innerHTML=`<div class="offer-head"><strong>Offer ${i+1}</strong><button class="danger" type="button" data-remove="${i}">Remove</button></div><div class="grid"><label>Value<input data-offer="${i}" data-key="value" value="${attr(o.value)}"></label><label>Suffix<input data-offer="${i}" data-key="suffix" value="${attr(o.suffix)}"></label><label>Title<input data-offer="${i}" data-key="title" value="${attr(o.title)}"></label><label>Code<input data-offer="${i}" data-key="code" value="${attr(o.code)}"></label><label>Terms<input data-offer="${i}" data-key="terms" value="${attr(o.terms)}"></label><label>Product Upload<input data-image="${i}" type="file" accept="image/*"></label></div><label>Details<textarea data-offer="${i}" data-key="details">${esc(o.details)}</textarea></label>`; $("offerEditor").appendChild(card); }); }
    function couponCard(o){ return `<section class="coupon"><div><div class="value">${esc(o.value)} <small>${esc(o.suffix)}</small></div><div class="desc">${esc(o.title)}</div><p>${esc(o.details)}</p><b>${esc(o.terms)}</b><p class="fine">${esc(text("finePrint"))}</p></div>${product(o)}<div class="barcode-wrap">${barcodeBlock(o.code)}</div></section>`; }
    function renderGrocery(){ return `<div class="hero"><div>${logo()}<div class="kicker">${esc(text("brand"))}</div><h1>${esc(text("headline"))}</h1><p>${esc(text("subheadline"))}</p></div>${product(null,true)}</div>${offers.map(couponCard).join("")}`; }
    function renderSuper(){ const o=offers[0]||{}; return `<div class="hero">${logo()}<h1>${esc(text("brand"))}</h1><div class="big">${esc(o.value||"15%")}</div><div class="sub">${esc(text("headline"))}</div><p>${esc(text("validDates"))}</p></div><div class="offer-row"><div>${product(o,true)}</div><div class="coupon"><div class="value">${esc(o.value)} ${esc(o.suffix)}</div><h2>${esc(o.title)}</h2><p>${esc(o.details)}</p><p>${esc(text("finePrint"))}</p>${barcodeBlock(o.code)}</div></div>`; }
    function renderMailer(){ return `<div class="top"><div class="food-panel"><div>${logo()}<h1>${esc(text("headline"))}</h1><p>${esc(text("subheadline"))}</p></div>${product(offers[0],true)}</div><div class="signup"><h2>${esc(text("brand"))} Rewards</h2><p>${esc(text("validDates"))}</p>${barcodeBlock(text("couponCode"))}</div></div><div class="locations"><div class="location"><b>Form City</b><br>404 Form Ave<br>801-000-0001</div><div class="location"><b>Template Park</b><br>101 Layout Ln<br>801-000-0002</div><div class="location"><b>Preview Plaza</b><br>22 Pixel Rd<br>801-000-0003</div></div><div class="coupon-row">${offers.slice(0,3).map(couponCard).join("")}</div><h2 style="text-align:center;margin:10px 0">OVER ${offers.length} SAMPLE COUPONS - TURN OVER FOR MORE</h2>`; }
    function renderApp(){ return `<div class="hero"><div><h1>${esc(text("headline"))}</h1><h2>${esc(text("subheadline"))}</h2></div><div>${logo()}</div></div><div class="tiles">${offers.map(o=>`<section class="coupon"><div class="value">${esc(o.value)}</div>${product(o)}<h3>${esc(o.title)}</h3><p>${esc(o.details)}</p><b>${esc(o.terms)}</b></section>`).join("")}</div>`; }
    function renderLuxe(){ return `<div class="hero">${logo()}<h1>${esc(text("headline"))}</h1><div class="big">${esc(text("subheadline"))}</div><p>${esc(text("validDates"))}</p>${barcodeBlock(text("couponCode"))}</div><div class="tiles">${offers.slice(0,4).map(couponCard).join("")}</div>`; }
    function update(){ document.documentElement.style.setProperty('--paper',text('bgColor')||'#fff400'); document.documentElement.style.setProperty('--accent',text('accentColor')||'#ed174f'); document.documentElement.style.setProperty('--deep',text('darkColor')||'#1d1a54'); const sheet=$("couponSheet"); const style=text("style"); sheet.className=`coupon-sheet style-${style}`; sheet.innerHTML=style==="super"?renderSuper():style==="mailer"?renderMailer():style==="app"?renderApp():style==="luxe"?renderLuxe():renderGrocery(); }
    fields.forEach(id=>{$(id).addEventListener('input',update);$(id).addEventListener('change',update)});
    $("logoInput").addEventListener('change',e=>readFile(e.target.files[0],v=>{logoData=v;update()})); $("heroImageInput").addEventListener('change',e=>readFile(e.target.files[0],v=>{heroData=v;update()}));
    function readFile(file,cb){ if(!file)return; const r=new FileReader(); r.onload=()=>cb(r.result); r.readAsDataURL(file); }
    $("offerEditor").addEventListener('input',e=>{const i=Number(e.target.dataset.offer),k=e.target.dataset.key;if(!Number.isNaN(i)&&k){offers[i][k]=e.target.value;update();}});
    $("offerEditor").addEventListener('change',e=>{const img=e.target.dataset.image;if(img!==undefined){readFile(e.target.files[0],v=>{offers[Number(img)].image=v;update();});}});
    $("offerEditor").addEventListener('click',e=>{const r=e.target.dataset.remove;if(r===undefined)return;offers.splice(Number(r),1);renderOfferControls();update();});
    $("addOffer").addEventListener('click',()=>{offers.push({value:"$1",suffix:"off",title:"New Sample Offer",details:"Editable product description",terms:"Preview terms",image:"",code:"FPNEW"});renderOfferControls();update();});
    renderOfferControls();update();
  </script>
</body>
</html>
