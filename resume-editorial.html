<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial Resume — Form Porn</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#06070f;color:#fff;font-family:'DM Mono',monospace;padding:24px 16px 80px;display:flex;flex-direction:column;align-items:center;}
.topbar{width:100%;max-width:1100px;display:flex;justify-content:space-between;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid rgba(200,170,90,0.18);}
.topbar a{color:#c9a84c;text-decoration:none;font-size:11px;letter-spacing:2px;}
.ws{display:grid;grid-template-columns:280px 1fr;gap:24px;width:100%;max-width:1100px;align-items:start;}
.panel{background:#0d0e1c;border:1px solid rgba(200,170,90,0.18);border-radius:10px;padding:18px;margin-bottom:12px;}
.pt{font-size:9px;letter-spacing:3px;color:#c9a84c;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(200,170,90,0.15);}
.field{margin-bottom:9px;}
.field label{display:block;font-size:8px;letter-spacing:2px;color:#5a6b88;text-transform:uppercase;margin-bottom:3px;}
.field input,.field textarea,.field select{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(200,170,90,0.15);border-radius:4px;padding:7px 10px;color:#fff;font-family:'DM Mono',monospace;font-size:11px;outline:none;resize:none;}
.field input:focus,.field textarea:focus{border-color:#c9a84c;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-g{width:100%;padding:10px;background:linear-gradient(135deg,#c9a84c,#e8c96a);color:#07080f;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:6px;cursor:pointer;font-weight:700;margin-top:6px;}
.add-btn{background:rgba(200,170,90,0.08);border:1px dashed rgba(200,170,90,0.25);color:#c9a84c;border-radius:4px;padding:5px 10px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;width:100%;margin-top:5px;}
.entry{background:rgba(255,255,255,0.02);border:1px solid rgba(200,170,90,0.08);border-radius:5px;padding:10px;margin-bottom:7px;position:relative;}
.entry .rm{position:absolute;top:7px;right:7px;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.2);color:#ff8888;border-radius:3px;padding:2px 5px;font-size:8px;cursor:pointer;font-family:'DM Mono',monospace;}
.preview-col{position:sticky;top:20px;}
.plabel{font-size:9px;letter-spacing:3px;color:#5a6b88;text-transform:uppercase;margin-bottom:10px;text-align:center;}

/* EDITORIAL RESUME — Magazine / newspaper style */
.resume{
  width:680px;min-height:900px;
  background:#fff;
  font-family:'DM Sans',sans-serif;
  color:#1a1a1a;
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
}

/* Masthead — giant name across full width */
.r-masthead{
  padding:32px 44px 0;
  border-bottom:4px solid #1a1a1a;
  position:relative;
}
.r-issue{
  font-family:'DM Mono',monospace;
  font-size:8.5px;letter-spacing:3px;color:#888;
  text-transform:uppercase;margin-bottom:6px;
  display:flex;justify-content:space-between;
}
.r-name{
  font-family:'Playfair Display',serif;
  font-size:60px;font-weight:900;
  color:#1a1a1a;letter-spacing:-2px;
  line-height:0.9;margin-bottom:8px;
}
.r-title-bar{
  display:flex;justify-content:space-between;align-items:flex-end;
  padding-bottom:12px;
  border-top:1.5px solid #1a1a1a;
  margin-top:8px;padding-top:8px;
}
.r-title-main{
  font-family:'DM Mono',monospace;
  font-size:11px;font-weight:500;
  letter-spacing:3px;text-transform:uppercase;color:#333;
}
.r-contact-line{
  font-family:'DM Mono',monospace;
  font-size:9px;color:#888;letter-spacing:1px;
}

/* Body — 2 column magazine layout */
.r-body{
  display:grid;
  grid-template-columns:1fr 2px 1fr;
  gap:0;
  padding:0 44px;
  margin-top:20px;
}
.r-col-div{background:#e0e0e0;margin:0 20px;}

.r-left{padding-right:20px;}
.r-right{padding-left:20px;}

.r-section{margin-bottom:22px;}
.r-section-label{
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:3px;text-transform:uppercase;
  color:#888;margin-bottom:8px;
  padding-bottom:4px;
  border-bottom:1px solid #e0e0e0;
}

/* Pull quote style for summary */
.r-pullquote{
  font-family:'Playfair Display',serif;
  font-size:16px;font-style:italic;font-weight:400;
  color:#1a1a1a;line-height:1.5;
  border-left:3px solid #1a1a1a;
  padding-left:12px;
  margin-bottom:14px;
}

.r-job{margin-bottom:14px;padding-bottom:14px;border-bottom:0.5px solid #eee;}
.r-job:last-child{border-bottom:none;}
.r-job-title{font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.2;}
.r-job-meta{
  font-family:'DM Mono',monospace;
  font-size:8.5px;color:#888;letter-spacing:1px;
  margin:3px 0 6px;
}
.r-job-bullets{list-style:none;}
.r-job-bullets li{
  font-size:11.5px;color:#333;line-height:1.6;
  padding-left:10px;position:relative;margin-bottom:2px;
}
.r-job-bullets li::before{content:'—';position:absolute;left:0;color:#1a1a1a;font-size:9px;top:3px;}

.r-skill-tag{
  display:inline-block;
  border:1px solid #1a1a1a;
  padding:3px 8px;
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:1px;
  margin:0 4px 4px 0;color:#1a1a1a;
}

.r-edu{margin-bottom:10px;}
.r-edu-d{font-size:12px;font-weight:600;color:#1a1a1a;}
.r-edu-s{font-family:'DM Mono',monospace;font-size:9px;color:#888;margin-top:1px;}
.r-edu-y{font-family:'DM Mono',monospace;font-size:9px;color:#aaa;}

.r-lang{display:flex;justify-content:space-between;font-size:11px;color:#333;margin-bottom:4px;border-bottom:0.5px dotted #eee;padding-bottom:4px;}
.r-lang-lv{font-family:'DM Mono',monospace;font-size:9px;color:#888;}

.r-footer{
  background:#1a1a1a;
  padding:8px 44px;
  display:flex;justify-content:space-between;
  margin-top:20px;
}
.r-footer span{font-size:8px;color:rgba(255,255,255,0.25);letter-spacing:2px;font-family:'DM Mono',monospace;}
</style>
</head>
<body>
<div class="topbar"><a href="/index.html">← Form Porn</a><a href="/pricing.html">50¢ to Export</a></div>
<div class="ws">
<div>
  <div class="panel"><div class="pt">Info</div>
    <div class="field"><label>Full Name</label><input id="rn" value="Forma L. Papeston" oninput="r()"></div>
    <div class="field"><label>Title / Tagline</label><input id="rt" value="Creative Director · Brand Strategist · Writer" oninput="r()"></div>
    <div class="r2">
      <div class="field"><label>Email</label><input id="re" value="forma@papeston.co" oninput="r()"></div>
      <div class="field"><label>Phone</label><input id="rp" value="(310) 555-0197" oninput="r()"></div>
    </div>
    <div class="r2">
      <div class="field"><label>Location</label><input id="rl" value="Beverly Hills, CA" oninput="r()"></div>
      <div class="field"><label>Portfolio/Web</label><input id="rw" value="papeston.co" oninput="r()"></div>
    </div>
    <div class="field"><label>Summary / Pull Quote</label><textarea id="rs" rows="3" oninput="r()">"Decade-long career crafting narratives at the intersection of luxury, culture, and commerce. Known for work that stops the scroll and starts a conversation."</textarea></div>
  </div>
  <div class="panel"><div class="pt">Experience</div>
    <div id="exp-entries">
      <div class="entry" id="exp-0">
        <button class="rm" onclick="rmExp(0)">✕</button>
        <div class="field"><label>Title</label><input id="e0t" value="Global Creative Director" oninput="r()"></div>
        <div class="r2"><div class="field"><label>Company</label><input id="e0c" value="House of Forma Creative" oninput="r()"></div><div class="field"><label>Dates</label><input id="e0d" value="2020 — Present" oninput="r()"></div></div>
        <div class="field"><label>Bullets</label><textarea id="e0b" rows="2" oninput="r()">Directed global campaigns for 12 luxury brands across 3 continents
Won Cannes Lions Gold for brand identity series
Led 22-person creative team across NY, LA, and Paris offices</textarea></div>
      </div>
      <div class="entry" id="exp-1">
        <button class="rm" onclick="rmExp(1)">✕</button>
        <div class="field"><label>Title</label><input id="e1t" value="Senior Art Director" oninput="r()"></div>
        <div class="r2"><div class="field"><label>Company</label><input id="e1c" value="Prestige Agency NYC" oninput="r()"></div><div class="field"><label>Dates</label><input id="e1d" value="2016 — 2020" oninput="r()"></div></div>
        <div class="field"><label>Bullets</label><textarea id="e1b" rows="2" oninput="r()">Created visual identity for 30+ premium fashion and lifestyle brands
Pioneered agency's luxury vertical from $0 to $4M annual revenue</textarea></div>
      </div>
    </div>
    <button class="add-btn" onclick="addExp()">+ Add Role</button>
  </div>
  <div class="panel"><div class="pt">Skills & Education</div>
    <div class="field"><label>Skills (comma separated)</label><textarea id="rsk" rows="2" oninput="r()">Brand Strategy, Art Direction, Typography, Campaign Development, Team Leadership, Editorial Design</textarea></div>
    <div class="field"><label>Education</label><textarea id="redu" rows="2" oninput="r()">B.F.A. Graphic Design · Parsons School of Design · 2016
M.F.A. Design · Yale School of Art · 2018</textarea></div>
    <div class="field"><label>Languages</label><textarea id="rlng" rows="2" oninput="r()">English: Native
French: Professional
Italian: Conversational</textarea></div>
  </div>
  <button class="btn-g" onclick="exp()">⬇ Export — 50¢</button>
</div>
<div class="preview-col"><p class="plabel">Live Preview</p>
<div class="resume" id="rdoc">
  <div class="r-masthead">
    <div class="r-issue"><span id="d_title">Creative Director · Brand Strategist · Writer</span><span id="d_loc">Beverly Hills, CA</span></div>
    <div class="r-name" id="d_name">Forma L. Papeston</div>
    <div class="r-title-bar">
      <span class="r-title-main" id="d_contact">forma@papeston.co &nbsp;·&nbsp; (310) 555-0197</span>
      <span class="r-contact-line" id="d_web">papeston.co</span>
    </div>
  </div>
  <div class="r-body">
    <div class="r-left">
      <div class="r-section">
        <div class="r-section-label">Profile</div>
        <div class="r-pullquote" id="d_summary">"Summary here."</div>
      </div>
      <div class="r-section">
        <div class="r-section-label">Experience</div>
        <div id="d_exp"></div>
      </div>
    </div>
    <div class="r-col-div"></div>
    <div class="r-right">
      <div class="r-section">
        <div class="r-section-label">Expertise</div>
        <div id="d_skills"></div>
      </div>
      <div class="r-section" style="margin-top:18px;">
        <div class="r-section-label">Education</div>
        <div id="d_edu"></div>
      </div>
      <div class="r-section" style="margin-top:18px;">
        <div class="r-section-label">Languages</div>
        <div id="d_langs"></div>
      </div>
    </div>
  </div>
  <div class="r-footer"><span id="d_fn">FORMA L. PAPESTON</span><span>FORM PORN</span></div>
</div></div></div>
<script>
let expCount=2;
function addExp(){
  const i=expCount++;
  const d=document.createElement('div');d.className='entry';d.id=`exp-${i}`;
  d.innerHTML=`<button class="rm" onclick="rmExp(${i})">✕</button>
    <div class="field"><label>Title</label><input id="e${i}t" value="Job Title" oninput="r()"></div>
    <div class="r2"><div class="field"><label>Company</label><input id="e${i}c" value="Company" oninput="r()"></div><div class="field"><label>Dates</label><input id="e${i}d" value="20XX" oninput="r()"></div></div>
    <div class="field"><label>Bullets</label><textarea id="e${i}b" rows="2" oninput="r()">Achievement here</textarea></div>`;
  document.getElementById('exp-entries').appendChild(d);r();
}
function rmExp(i){const e=document.getElementById(`exp-${i}`);if(e)e.remove();r();}
function g(id){const e=document.getElementById(id);return e?e.value:'';}
function r(){
  document.getElementById('d_name').textContent=g('rn');
  document.getElementById('d_title').textContent=g('rt');
  document.getElementById('d_contact').textContent=g('re')+' · '+g('rp');
  document.getElementById('d_web').textContent=g('rw');
  document.getElementById('d_loc').textContent=g('rl');
  document.getElementById('d_summary').textContent=g('rs');
  document.getElementById('d_fn').textContent=(g('rn')||'').toUpperCase();
  let ex='';
  document.querySelectorAll('[id^="exp-"][id$="t"]:not(.entry),[id^="e"][id$="t"]').forEach(el=>{
    const i=el.id.replace(/[^0-9]/g,'');
    const t=g(`e${i}t`),c=g(`e${i}c`),d=g(`e${i}d`),b=g(`e${i}b`).split('\n').filter(Boolean);
    if(!t)return;
    ex+=`<div class="r-job"><div class="r-job-title">${t}</div><div class="r-job-meta">${c} &nbsp;·&nbsp; ${d}</div><ul class="r-job-bullets">${b.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  });
  document.getElementById('d_exp').innerHTML=ex;
  const sk=g('rsk').split(',').map(s=>s.trim()).filter(Boolean);
  document.getElementById('d_skills').innerHTML=sk.map(s=>`<span class="r-skill-tag">${s}</span>`).join('');
  const edu=g('redu').split('\n').filter(Boolean);
  document.getElementById('d_edu').innerHTML=edu.map(e=>{const p=e.split('·').map(x=>x.trim());return`<div class="r-edu"><div class="r-edu-d">${p[0]||''}</div><div class="r-edu-s">${p[1]||''}</div><div class="r-edu-y">${p[2]||''}</div></div>`;}).join('');
  const ln=g('rlng').split('\n').filter(Boolean);
  document.getElementById('d_langs').innerHTML=ln.map(l=>{const[n,lv]=l.split(':').map(x=>x.trim());return`<div class="r-lang"><span>${n||l}</span><span class="r-lang-lv">${lv||''}</span></div>`;}).join('');
}
async function exp(){
  const c=await html2canvas(document.getElementById('rdoc'),{scale:3,backgroundColor:'#fff',logging:false});
  const l=document.createElement('a');l.download='forma-resume-editorial.png';l.href=c.toDataURL('image/png');l.click();
}
r();
</script>
</body>
</html>
